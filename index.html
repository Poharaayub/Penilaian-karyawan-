<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penilaian Kualitas Karyawan OCS NFI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F9F9FF;
            color: #191C20;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #D6E3FF;
            border-radius: 10px;
        }

        .m3-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #E0E2EC;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (min-width: 768px) {
            .m3-card { border-radius: 32px; }
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: rgba(249, 249, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(224, 226, 236, 0.5);
        }

        .category-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .chart-container { height: 420px; }
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2344474E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        .animate-spin-once {
            animation: spin 0.5s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-0 m-0 overflow-x-hidden">

<div id="app" class="max-w-7xl mx-auto px-3 py-4 md:px-8 md:py-8 space-y-4 md:space-y-8">
    
    <!-- STICKY HEADER -->
    <div class="sticky-header -mx-3 px-3 py-3 md:-mx-8 md:px-8 space-y-3 shadow-sm md:shadow-none">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div class="flex items-center gap-2 text-[#005FB0]">
                <!-- Header lebal removed -->
            </div>
            
            <div class="flex items-center justify-between sm:justify-end gap-2">
                <button onclick="toggleModal(true)" class="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-[#D6E3FF] text-[#001B3E] px-4 py-2.5 rounded-full hover:bg-[#C2D6FF] transition-all font-bold text-[10px] md:text-xs shadow-sm active:scale-95">
                    <i data-lucide="filter" class="w-3.5 h-3.5"></i>
                    <span id="categoryLabel" class="truncate max-w-[100px] md:max-w-none">Nilai Akhir</span>
                    <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                </button>

                <div class="flex-1 sm:flex-none flex items-center gap-2 bg-[#F0F0F7] px-3 py-2.5 rounded-full border border-transparent">
                    <i data-lucide="calendar" class="w-3.5 h-3.5 text-[#44474E]"></i>
                    <select id="periodSelect" onchange="changePeriod(this.value)" class="w-full bg-transparent text-[10px] md:text-xs font-bold text-[#191C20] focus:outline-none cursor-pointer pr-6">
                        <option value="Semua">Semua</option>
                    </select>
                </div>

                <button id="refreshBtn" onclick="refreshData()" class="p-2.5 bg-white border border-[#E0E2EC] rounded-full hover:bg-[#F9F9FF] transition-all text-[#44474E] active:bg-slate-100">
                    <i data-lucide="refresh-cw" id="refreshIcon" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div class="bg-[#F0F4FF] border-l-4 border-[#005FB0] px-3 py-2.5 rounded-r-2xl shadow-sm">
            <div class="flex items-start gap-2">
                <i data-lucide="info" class="w-3.5 h-3.5 text-[#005FB0] shrink-0 mt-0.5"></i>
                <p class="text-[9px] md:text-xs text-[#1C1B1F] font-semibold tracking-tight leading-tight">
                    Semua kategori penilaian dinilai langsung oleh Klien, Team Leader Area & Area Manager.
                </p>
            </div>
        </div>
    </div>

    <!-- ERROR ALERT -->
    <div id="errorAlert" class="hidden bg-red-50 border border-red-100 p-4 rounded-2xl flex items-center gap-3 text-red-800 text-xs font-medium animate-pulse">
        <i data-lucide="file-warning" class="text-red-600 flex-shrink-0"></i>
        <p id="errorMessage"></p>
    </div>

    <!-- MAIN CHART AREA -->
    <div class="m3-card p-4 md:p-10 relative overflow-hidden bg-white shadow-sm">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2 text-[#005FB0]">
                <i data-lucide="trending-up" class="w-4 h-4"></i>
            </div>
            <div class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full text-[9px] md:text-[10px] font-black flex items-center gap-1.5 uppercase tracking-wider border border-blue-100 shadow-sm">
                <i data-lucide="tag" class="w-3 h-3 text-blue-500"></i>
                <span id="chartIndicatorLabel">Indikator: Nilai Akhir</span>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="performanceChart"></canvas>
            <div id="emptyState" class="hidden absolute inset-0 flex flex-col items-center justify-center text-[#74777F]">
                <i data-lucide="search" class="w-12 h-12 opacity-20 mb-4"></i>
                <p class="text-[10px] font-bold uppercase tracking-widest italic text-slate-300">Data tidak tersedia</p>
            </div>
        </div>
    </div>

    <!-- TOP 3 HIGHLIGHTS (KHUSUS NILAI AKHIR) -->
    <section class="space-y-4 md:space-y-6">
        <div class="flex items-center gap-3 px-2">
            <div class="p-2 bg-[#D6E3FF] rounded-xl text-[#001B3E]">
                <i data-lucide="award" class="w-5 h-5"></i>
            </div>
            <h2 class="text-[10px] md:text-xs font-bold text-[#44474E] uppercase tracking-[0.4em]">Karyawan Terbaik (Nilai Akhir)</h2>
        </div>

        <div id="topCardsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
            <!-- Cards injected by JS -->
        </div>
    </section>
</div>

<!-- CATEGORY MODAL -->
<div id="categoryModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-[6px] transition-all">
    <div class="bg-[#F9F9FF] w-full max-w-2xl rounded-[32px] shadow-2xl overflow-hidden scale-95 transition-all duration-300" id="modalContent">
        <div class="p-6 md:p-8 flex items-center justify-between border-b border-slate-100">
            <div class="flex items-center gap-3">
                <i data-lucide="target" class="w-5 h-5 md:w-6 md:h-6 text-[#005FB0]"></i>
                <h2 class="text-lg md:text-xl font-bold text-[#191C20]">Parameter Penilaian</h2>
            </div>
            <button onclick="toggleModal(false)" class="p-2 hover:bg-[#E0E2EC] rounded-full transition-colors active:bg-slate-200">
                <i data-lucide="x" class="w-6 h-6 text-[#191C20]"></i>
            </button>
        </div>
        <div id="categoryGrid" class="p-4 md:p-8 pt-4 category-grid-container max-h-[60vh] overflow-y-auto custom-scrollbar">
            <!-- Buttons dynamically generated here -->
        </div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdRfgbKADZOv9yvI0YxRI_jHe6pfaGba5nwlZcoVWLQtMsARvTw0wqPCYsNXxq_fUYRLcxnHjBrq6n/pub?output=csv';
    
    const CATEGORIES = [
        "Kedis-iplinan", "Kerapihan", "Sikap", "Kebersihan Area", "Kerja Sama Tim",
        "Inisiatif", "Ketelitian", "Komu-nikasi", "Tanggung Jawab", "Kecepatan Kerja",
        "Kemandi-rian", "Pemaham-an Tugas", "Keramah-an", "Kepatuhan SOP", "Pengguna-an Alat",
        "Kebersihan Diri", "Kesiapan Kerja", "Penyesu-aian Lingk.", "Kreativitas"
    ];

    let rawData = [];
    let selectedPeriode = 'Semua';
    let selectedCategory = 'Nilai Akhir';
    let chartInstance = null;

    // Initialization
    window.addEventListener('load', () => {
        lucide.createIcons();
        refreshData();
    });

    function getCurrentMonthString() {
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const now = new Date();
        return `${months[now.getMonth()]} ${now.getFullYear()}`;
    }

    async function refreshData() {
        const icon = document.getElementById('refreshIcon');
        if (icon) icon.classList.add('animate-spin');
        
        try {
            const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
            if (!response.ok) throw new Error('Koneksi Gagal');
            const text = await response.text();
            parseCSV(text);
            document.getElementById('errorAlert').classList.add('hidden');
        } catch (e) {
            console.error("CSV Load Error:", e);
            document.getElementById('errorAlert').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = 'Sinkronisasi gagal. Pastikan link Google Sheets Anda sudah di-publish.';
            loadSimulationData();
        } finally {
            // Hentikan animasi refresh saat data sudah dimuat
            if (icon) icon.classList.remove('animate-spin');
            updateUI();
            renderCategoryButtons();
        }
    }

    function parseCSV(text) {
        const rows = text.replace(/^\uFEFF/, "").trim().split(/\r?\n/).map(row => row.trim()).filter(r => r);
        if (rows.length < 2) return;

        const delimiter = rows[0].includes(';') ? ';' : ',';
        const headers = rows[0].split(delimiter).map(h => h.trim().replace(/^["']|["']$/g, ''));
        
        rawData = rows.slice(1).map(row => {
            const values = row.split(delimiter).map(v => v.trim().replace(/^["']|["']$/g, ''));
            const obj = {};
            headers.forEach((header, i) => {
                const val = values[i] || "";
                const normalized = val.replace(',', '.');
                if (CATEGORIES.includes(header) || header === "Nilai Akhir" || !isNaN(normalized)) {
                    obj[header] = parseFloat(normalized) || 0;
                } else {
                    obj[header] = val;
                }
            });
            return obj;
        });

        populatePeriodSelect();
        setDefaultPeriod();
    }

    function loadSimulationData() {
        const months = [getCurrentMonthString()];
        const names = ["Ahmad Fauzi", "Budi Santoso", "Cici Amalia", "Dedi Kurniawan", "Eka Saputra"];
        rawData = [];
        months.forEach(p => {
            names.forEach(n => {
                let obj = { "Nama Karyawan": n, "Periode": p, "Catatan": "Kinerja memenuhi standar operasional.", "Nilai Akhir": 85 };
                CATEGORIES.forEach(c => obj[c] = Math.floor(Math.random() * 20) + 75);
                rawData.push(obj);
            });
        });
        populatePeriodSelect();
        selectedPeriode = months[0];
        document.getElementById('periodSelect').value = selectedPeriode;
    }

    function populatePeriodSelect() {
        const periods = ['Semua', ...new Set(rawData.map(d => d.Periode).filter(Boolean))];
        const select = document.getElementById('periodSelect');
        select.innerHTML = periods.map(p => `<option value="${p}">${p}</option>`).join('');
    }

    function setDefaultPeriod() {
        const currentMonthStr = getCurrentMonthString();
        const periods = [...new Set(rawData.map(d => d.Periode).filter(Boolean))];
        
        if (periods.includes(currentMonthStr)) {
            selectedPeriode = currentMonthStr;
        } else if (periods.length > 0) {
            selectedPeriode = periods[periods.length - 1];
        }
        document.getElementById('periodSelect').value = selectedPeriode;
    }

    function changePeriod(val) {
        selectedPeriode = val;
        updateUI();
    }

    function toggleModal(show) {
        const modal = document.getElementById('categoryModal');
        const content = document.getElementById('modalContent');
        if (show) {
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        } else {
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }
    }

    function renderCategoryButtons() {
        const grid = document.getElementById('categoryGrid');
        if (!grid) return;

        let html = `
            <button onclick="selectCategory('Nilai Akhir')" class="category-btn flex items-center justify-between px-4 py-3 rounded-xl text-[10px] md:text-xs font-black transition-all border col-span-full mb-2 shadow-sm" data-cat="Nilai Akhir">
                🏆 NILAI AKHIR (TOTAL)
                <span class="check-icon hidden text-[#005FB0]"><i data-lucide="check" class="w-4 h-4"></i></span>
            </button>
        `;
        CATEGORIES.forEach(cat => {
            html += `
                <button onclick="selectCategory('${cat}')" class="category-btn flex items-center justify-between text-left px-3 py-2.5 rounded-lg text-[9px] md:text-[10px] font-bold transition-all border bg-white" data-cat="${cat}">
                    <span class="truncate">${cat.split('-').join(' ')}</span>
                    <span class="check-icon hidden text-[#005FB0]"><i data-lucide="check" class="w-3 h-3"></i></span>
                </button>
            `;
        });
        grid.innerHTML = html;
        lucide.createIcons();
        highlightActiveCategory();
    }

    function selectCategory(cat) {
        selectedCategory = cat;
        highlightActiveCategory();
        toggleModal(false);
        updateUI();
    }

    function highlightActiveCategory() {
        document.querySelectorAll('.category-btn').forEach(btn => {
            const isActive = btn.getAttribute('data-cat') === selectedCategory;
            btn.classList.toggle('bg-[#D6E3FF]', isActive);
            btn.classList.toggle('text-[#001B3E]', isActive);
            btn.classList.toggle('border-transparent', isActive);
            const check = btn.querySelector('.check-icon');
            if (check) check.classList.toggle('hidden', !isActive);
        });
        document.getElementById('categoryLabel').innerText = selectedCategory.split('-').join(' ');
        document.getElementById('chartIndicatorLabel').innerText = `Indikator: ${selectedCategory.split('-').join(' ')}`;
    }

    function updateUI() {
        const filtered = rawData.filter(d => selectedPeriode === 'Semua' || d.Periode === selectedPeriode)
                         .sort((a, b) => (a["Nama Karyawan"] || "").localeCompare(b["Nama Karyawan"] || ""));

        // Grafik berdasarkan kategori aktif
        const topThreeForChart = [...filtered].sort((a, b) => b[selectedCategory] - a[selectedCategory]).slice(0, 3);
        
        // Kartu berdasarkan Nilai Akhir
        const topThreeFinal = [...filtered].sort((a, b) => b["Nilai Akhir"] - a["Nilai Akhir"]).slice(0, 3);

        renderChart(filtered, topThreeForChart);
        renderTopCards(topThreeFinal);
    }

    function renderChart(data, topThree) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        const emptyState = document.getElementById('emptyState');
        
        if (data.length === 0) {
            emptyState.classList.remove('hidden');
            if (chartInstance) chartInstance.destroy();
            return;
        }
        emptyState.classList.add('hidden');

        const labels = data.map(d => d["Nama Karyawan"]);
        const values = data.map(d => d[selectedCategory]);
        const topNames = topThree.map(t => t["Nama Karyawan"]);

        const backgroundColors = labels.map(name => {
            if (name === topNames[0]) return '#005FB0';
            if (name === topNames[1]) return '#4A71B5';
            if (name === topNames[2]) return '#8BA6D5';
            return '#E0E2EC';
        });

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: backgroundColors,
                    borderRadius: 8,
                    borderSkipped: false,
                    barThickness: labels.length > 10 ? 15 : 30
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'white',
                        titleColor: '#191C20',
                        bodyColor: '#44474E',
                        padding: 12,
                        cornerRadius: 12,
                        displayColors: false,
                        borderColor: '#E0E2EC',
                        borderWidth: 1,
                        callbacks: {
                            label: (context) => `Skor: ${context.raw}`
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: '#F3F3F3', drawBorder: false },
                        ticks: { color: '#74777F', font: { size: 9, weight: 'bold' } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: {
                            color: '#44474E',
                            font: { size: 9, weight: 'bold' },
                            maxRotation: 45,
                            minRotation: 45
                        }
                    }
                },
                animation: {
                    duration: 1000,
                    easing: 'easeOutQuart'
                }
            }
        });
    }

    function renderTopCards(topThree) {
        const container = document.getElementById('topCardsContainer');
        if (topThree.length === 0) {
            container.innerHTML = '<div class="col-span-full py-10 text-center text-slate-300 font-bold italic text-xs uppercase tracking-widest">Pilih periode untuk melihat ranking</div>';
            return;
        }

        container.innerHTML = topThree.map((emp, idx) => `
            <div class="relative bg-white p-6 md:p-8 rounded-[32px] border transition-all duration-500 hover:shadow-xl hover:-translate-y-1 ${idx === 0 ? 'border-amber-300 shadow-md scale-[1.02] z-10' : 'border-[#E0E2EC]'}">
                <div class="absolute top-0 right-0 p-4 md:p-5 rounded-bl-[32px] shadow-sm ${idx === 0 ? 'bg-[#005FB0] text-white' : idx === 1 ? 'bg-[#4A71B5] text-white' : 'bg-[#8BA6D5] text-[#001B3E]'}">
                    <i data-lucide="medal" class="w-5 h-5 md:w-6 md:h-6"></i>
                </div>
                
                <div class="space-y-4">
                    <div class="text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] ${idx === 0 ? 'text-amber-500' : 'text-[#74777F]'}">
                        ${idx === 0 ? '🏆 Peringkat 1' : idx === 1 ? '🥈 Peringkat 2' : '🥉 Peringkat 3'}
                    </div>
                    
                    <div>
                        <h3 class="text-base md:text-xl font-black text-[#191C20] truncate pr-10">${emp["Nama Karyawan"]}</h3>
                        <p class="text-[9px] md:text-xs font-bold text-[#74777F] mt-1 uppercase tracking-tighter opacity-70">Bulan: ${emp["Periode"]}</p>
                    </div>

                    <div class="bg-[#F9F9FF] p-4 md:p-6 rounded-[24px] min-h-[80px] flex items-center border border-[#E0E2EC]/50 shadow-inner">
                        <p class="text-[10px] md:text-xs font-medium text-[#44474E] italic leading-relaxed">
                            "${emp["Catatan"] || 'Performa memenuhi standar operasional OCS.'}"
                        </p>
                    </div>

                    <div class="pt-5 flex items-end justify-between border-t border-[#E0E2EC]">
                        <div>
                            <div class="text-[9px] font-bold text-[#74777F] uppercase tracking-widest leading-none">Nilai Akhir</div>
                            <div class="text-3xl md:text-4xl font-black leading-none mt-2 ${idx === 0 ? 'text-[#005FB0]' : 'text-[#191C20]'}">
                                ${emp["Nilai Akhir"] || 0}
                            </div>
                        </div>
                        <div class="text-right">
                           <div class="text-[9px] font-bold text-[#74777F] uppercase tracking-widest leading-none">${selectedCategory === 'Nilai Akhir' ? 'Audit' : selectedCategory.split('-').join(' ')}</div>
                           <div class="text-lg md:text-xl font-black text-[#191C20] mt-2 bg-[#F0F0F7] px-3 py-1 rounded-full">${emp[selectedCategory] || 0}</div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }
</script>

</body>
</html>
