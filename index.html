<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penilaian Kualitas Karyawan OCS NFI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Library untuk Konversi Gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F9F9FF;
            color: #191C20;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D6E3FF; border-radius: 10px; }

        .m3-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #E0E2EC;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: rgba(249, 249, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(224, 226, 236, 0.5);
        }

        /* Certificate Styling */
        .certificate-container {
            position: relative;
            background: #fff;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-image: radial-gradient(#fcfcfc 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: hidden;
        }

        /* Gold Variant */
        .cert-gold {
            border: 10px solid #D4AF37;
            border-image: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C) 1;
        }
        .cert-gold .certificate-content { border: 2px solid #D4AF37; }
        .cert-gold .seal { background: radial-gradient(circle, #D4AF37 0%, #AA771C 100%); }
        .cert-gold .certificate-recipient { color: #856404; border-bottom: 2px solid #D4AF37; }

        /* Silver Variant */
        .cert-silver {
            border: 10px solid #A0A0A0;
            border-image: linear-gradient(45deg, #757575, #C0C0C0, #E8E8E8, #A0A0A0, #757575) 1;
        }
        .cert-silver .certificate-content { border: 2px solid #A0A0A0; }
        .cert-silver .seal { background: radial-gradient(circle, #B0B0B0 0%, #606060 100%); }
        .cert-silver .certificate-recipient { color: #44474E; border-bottom: 2px solid #A0A0A0; }

        .certificate-content {
            padding: 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
        }

        .certificate-title {
            font-family: 'Playfair Display', serif;
            color: #1a1a1a;
            letter-spacing: 2px;
        }

        .certificate-recipient {
            font-family: 'Playfair Display', serif;
            display: inline-block;
            padding: 0 20px;
        }

        .seal {
            position: absolute;
            bottom: 30px;
            right: 40px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transform: rotate(-15deg);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .chart-container { height: 420px; }
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2344474E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        .category-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
        }
    </style>
</head>
<body class="p-0 m-0 overflow-x-hidden">

<div id="app" class="max-w-7xl mx-auto px-3 py-4 md:px-8 md:py-8 space-y-4 md:space-y-8">
    
    <!-- STICKY HEADER -->
    <div class="sticky-header -mx-3 px-3 py-3 md:-mx-8 md:px-8 space-y-3 shadow-sm md:shadow-none">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div class="flex items-center gap-2 text-[#005FB0]">
            </div>
            
            <div class="flex items-center justify-between sm:justify-end gap-2">
                <button onclick="toggleModal(true)" class="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-[#D6E3FF] text-[#001B3E] px-4 py-2.5 rounded-full hover:bg-[#C2D6FF] transition-all font-bold text-[10px] md:text-xs shadow-sm active:scale-95">
                    <i data-lucide="filter" class="w-3.5 h-3.5"></i>
                    <span id="categoryLabel" class="truncate max-w-[100px] md:max-w-none">Nilai Akhir</span>
                    <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                </button>

                <div class="flex-1 sm:flex-none flex items-center gap-2 bg-[#F0F0F7] px-3 py-2.5 rounded-full border border-transparent">
                    <i data-lucide="calendar" class="w-3.5 h-3.5 text-[#44474E]"></i>
                    <select id="periodSelect" onchange="changePeriod(this.value)" class="w-full bg-transparent text-[10px] md:text-xs font-bold text-[#191C20] focus:outline-none cursor-pointer pr-6">
                        <option value="Semua">Semua</option>
                    </select>
                </div>

                <button id="refreshBtn" onclick="refreshData()" class="p-2.5 bg-white border border-[#E0E2EC] rounded-full hover:bg-[#F9F9FF] transition-all text-[#44474E] active:bg-slate-100">
                    <i data-lucide="refresh-cw" id="refreshIcon" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div class="bg-[#F0F4FF] border-l-4 border-[#005FB0] px-3 py-2.5 rounded-r-2xl shadow-sm">
            <div class="flex items-start gap-2">
                <i data-lucide="info" class="w-3.5 h-3.5 text-[#005FB0] shrink-0 mt-0.5"></i>
                <p class="text-[9px] md:text-xs text-[#1C1B1F] font-semibold tracking-tight leading-tight">
                    Semua kategori penilaian dinilai langsung oleh Klien, Team Leader Area & Area Manager.
                </p>
            </div>
        </div>
    </div>

    <!-- MAIN CHART AREA -->
    <div class="m3-card p-4 md:p-10 relative overflow-hidden bg-white shadow-sm">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2 text-[#005FB0]">
                <i data-lucide="trending-up" class="w-4 h-4"></i>
            </div>
            <div class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full text-[9px] md:text-[10px] font-black flex items-center gap-1.5 uppercase tracking-wider border border-blue-100 shadow-sm">
                <i data-lucide="tag" class="w-3 h-3 text-blue-500"></i>
                <span id="chartIndicatorLabel">Indikator: Nilai Akhir</span>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="performanceChart"></canvas>
            <div id="emptyState" class="hidden absolute inset-0 flex flex-col items-center justify-center text-[#74777F]">
                <i data-lucide="search" class="w-12 h-12 opacity-20 mb-4"></i>
                <p class="text-[10px] font-bold uppercase tracking-widest italic text-slate-300">Data tidak tersedia</p>
            </div>
        </div>
    </div>

    <!-- ERROR ALERT -->
    <div id="errorAlert" class="hidden bg-red-50 border border-red-100 p-4 rounded-2xl flex items-center gap-3 text-red-800 text-xs font-medium animate-pulse">
        <i data-lucide="file-warning" class="text-red-600 flex-shrink-0"></i>
        <p id="errorMessage"></p>
    </div>

    <!-- AWARD SECTION -->
    <section id="topRankingSection" class="space-y-6 hidden pb-10">
        <div class="flex items-center gap-3 px-2">
            <div class="p-2 bg-[#D6E3FF] rounded-xl text-[#001B3E]">
                <i data-lucide="award" class="w-5 h-5"></i>
            </div>
            <h2 class="text-[10px] md:text-xs font-bold text-[#44474E] uppercase tracking-[0.4em]">Piagam Penghargaan Karyawan</h2>
        </div>

        <div id="topCardsContainer" class="flex flex-col gap-10">
            <!-- Certificates injected by JS -->
        </div>
    </section>
</div>

<!-- CATEGORY MODAL -->
<div id="categoryModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-[6px] transition-all">
    <div class="bg-[#F9F9FF] w-full max-w-2xl rounded-[32px] shadow-2xl overflow-hidden scale-95 opacity-0 transition-all duration-300" id="modalContent">
        <div class="p-6 md:p-8 flex items-center justify-between border-b border-slate-100">
            <div class="flex items-center gap-3">
                <i data-lucide="target" class="w-5 h-5 md:w-6 md:h-6 text-[#005FB0]"></i>
                <h2 class="text-lg md:text-xl font-bold text-[#191C20]">Parameter Penilaian</h2>
            </div>
            <button onclick="toggleModal(false)" class="p-2 hover:bg-[#E0E2EC] rounded-full transition-colors active:bg-slate-200">
                <i data-lucide="x" class="w-6 h-6 text-[#191C20]"></i>
            </button>
        </div>
        <div id="categoryGrid" class="p-4 md:p-8 pt-4 category-grid-container max-h-[60vh] overflow-y-auto custom-scrollbar">
        </div>
    </div>
</div>

<!-- PASSWORD MODAL FOR DOWNLOAD -->
<div id="passwordModal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-all duration-300">
    <div class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl scale-95 opacity-0 transition-all duration-300" id="passwordModalContent">
        <div class="flex flex-col items-center text-center">
            <div class="p-4 bg-blue-50 rounded-full text-[#005FB0] mb-4">
                <i data-lucide="lock" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold text-[#191C20] mb-2">Otentikasi Diperlukan</h3>
            <p class="text-sm text-[#44474E] mb-6 leading-relaxed">Masukkan kata sandi untuk menyimpan piagam penghargaan ini sebagai gambar.</p>
            
            <input type="password" id="certPasswordInput" class="w-full px-6 py-4 rounded-2xl border-2 border-[#E0E2EC] focus:border-[#005FB0] focus:outline-none mb-4 text-center tracking-[0.5em] font-black text-2xl transition-all" placeholder="••••">
            
            <div id="passwordError" class="hidden text-red-600 text-[10px] font-bold mb-4 flex items-center gap-1 uppercase tracking-widest">
                <i data-lucide="alert-circle" class="w-3 h-3"></i> Kata sandi salah!
            </div>
            
            <div class="flex w-full gap-3 mt-2">
                <button onclick="closePasswordModal()" class="flex-1 py-4 rounded-2xl bg-slate-100 text-[#44474E] font-bold text-xs hover:bg-slate-200 transition-all active:scale-95">Batal</button>
                <button onclick="verifyAndDownload()" class="flex-1 py-4 rounded-2xl bg-[#005FB0] text-white font-bold text-xs shadow-lg shadow-blue-200 hover:bg-[#004A8A] transition-all active:scale-95">Verifikasi</button>
            </div>
        </div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdRfgbKADZOv9yvI0YxRI_jHe6pfaGba5nwlZcoVWLQtMsARvTw0wqPCYsNXxq_fUYRLcxnHjBrq6n/pub?output=csv';
    
    const CATEGORIES = [
        "Kedis-iplinan", "Kerapihan", "Sikap", "Kebersihan Area", "Kerja Sama Tim",
        "Inisiatif", "Ketelitian", "Komu-nikasi", "Tanggung Jawab", "Kecepatan Kerja",
        "Kemandi-rian", "Pemaham-an Tugas", "Keramah-an", "Kepatuhan SOP", "Pengguna-an Alat",
        "Kebersihan Diri", "Kesiapan Kerja", "Penyesu-aian Lingk.", "Kreativitas"
    ];

    let rawData = [];
    let selectedPeriode = 'Semua';
    let selectedCategory = 'Nilai Akhir';
    let chartInstance = null;
    let pendingDownload = { id: '', name: '' };

    window.addEventListener('load', () => {
        lucide.createIcons();
        refreshData();
    });

    function getCurrentMonthString() {
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const now = new Date();
        return `${months[now.getMonth()]} ${now.getFullYear()}`;
    }

    async function refreshData() {
        const icon = document.getElementById('refreshIcon');
        if (icon) icon.classList.add('animate-spin');
        
        try {
            const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
            if (!response.ok) throw new Error('Koneksi Gagal');
            const text = await response.text();
            parseCSV(text);
            document.getElementById('errorAlert').classList.add('hidden');
        } catch (e) {
            console.error("CSV Load Error:", e);
            document.getElementById('errorAlert').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = 'Sinkronisasi gagal. Pastikan link Google Sheets Anda sudah di-publish.';
            loadSimulationData();
        } finally {
            if (icon) icon.classList.remove('animate-spin');
            updateUI();
            renderCategoryButtons();
        }
    }

    function parseCSV(text) {
        const rows = text.replace(/^\uFEFF/, "").trim().split(/\r?\n/).map(row => row.trim()).filter(r => r);
        if (rows.length < 2) return;

        const delimiter = rows[0].includes(';') ? ';' : ',';
        const headers = rows[0].split(delimiter).map(h => h.trim().replace(/^["']|["']$/g, ''));
        
        rawData = rows.slice(1).map(row => {
            const values = row.split(delimiter).map(v => v.trim().replace(/^["']|["']$/g, ''));
            const obj = {};
            headers.forEach((header, i) => {
                const val = values[i] || "";
                const normalized = val.replace(',', '.');
                if (CATEGORIES.includes(header) || header === "Nilai Akhir" || !isNaN(normalized)) {
                    obj[header] = parseFloat(normalized) || 0;
                } else {
                    obj[header] = val;
                }
            });
            return obj;
        });

        populatePeriodSelect();
        setDefaultPeriod();
    }

    function loadSimulationData() {
        const months = [getCurrentMonthString()];
        const names = ["Ahmad Fauzi", "Budi Santoso", "Cici Amalia", "Dedi Kurniawan", "Eka Saputra"];
        rawData = [];
        months.forEach(p => {
            names.forEach(n => {
                let obj = { "Nama Karyawan": n, "Periode": p, "Catatan": "Kinerja memenuhi standar operasional OCS.", "Nilai Akhir": 92 };
                CATEGORIES.forEach(c => obj[c] = Math.floor(Math.random() * 10) + 85);
                rawData.push(obj);
            });
        });
        populatePeriodSelect();
        selectedPeriode = months[0];
        const select = document.getElementById('periodSelect');
        if (select) select.value = selectedPeriode;
    }

    function populatePeriodSelect() {
        const periods = ['Semua', ...new Set(rawData.map(d => d.Periode).filter(Boolean))];
        const select = document.getElementById('periodSelect');
        if (select) select.innerHTML = periods.map(p => `<option value="${p}">${p}</option>`).join('');
    }

    function setDefaultPeriod() {
        const currentMonthStr = getCurrentMonthString();
        const periods = [...new Set(rawData.map(d => d.Periode).filter(Boolean))];
        if (periods.includes(currentMonthStr)) {
            selectedPeriode = currentMonthStr;
        } else if (periods.length > 0) {
            selectedPeriode = periods[periods.length - 1];
        }
        const select = document.getElementById('periodSelect');
        if (select) select.value = selectedPeriode;
    }

    function changePeriod(val) {
        selectedPeriode = val;
        updateUI();
    }

    function toggleModal(show) {
        const modal = document.getElementById('categoryModal');
        const content = document.getElementById('modalContent');
        if (show) {
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        } else {
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 250);
        }
    }

    function renderCategoryButtons() {
        const grid = document.getElementById('categoryGrid');
        if (!grid) return;
        let html = `<button onclick="selectCategory('Nilai Akhir')" class="category-btn flex items-center justify-between px-4 py-3 rounded-xl text-[10px] md:text-xs font-black transition-all border col-span-full mb-2 shadow-sm" data-cat="Nilai Akhir">🏆 NILAI AKHIR (TOTAL)<span class="check-icon hidden text-[#005FB0]"><i data-lucide="check" class="w-4 h-4"></i></span></button>`;
        CATEGORIES.forEach(cat => {
            html += `<button onclick="selectCategory('${cat}')" class="category-btn flex items-center justify-between text-left px-3 py-2.5 rounded-lg text-[9px] md:text-[10px] font-bold transition-all border bg-white" data-cat="${cat}"><span class="truncate">${cat.split('-').join(' ')}</span><span class="check-icon hidden text-[#005FB0]"><i data-lucide="check" class="w-3 h-3"></i></span></button>`;
        });
        grid.innerHTML = html;
        lucide.createIcons();
        highlightActiveCategory();
    }

    function selectCategory(cat) {
        selectedCategory = cat;
        highlightActiveCategory();
        toggleModal(false);
        updateUI();
    }

    function highlightActiveCategory() {
        document.querySelectorAll('.category-btn').forEach(btn => {
            const isActive = btn.getAttribute('data-cat') === selectedCategory;
            btn.classList.toggle('bg-[#D6E3FF]', isActive);
            btn.classList.toggle('text-[#001B3E]', isActive);
            btn.classList.toggle('border-transparent', isActive);
            const check = btn.querySelector('.check-icon');
            if (check) check.classList.toggle('hidden', !isActive);
        });
        const label = document.getElementById('categoryLabel');
        const indicator = document.getElementById('chartIndicatorLabel');
        const cleanName = selectedCategory.split('-').join(' ');
        if (label) label.innerText = cleanName;
        if (indicator) indicator.innerText = `Indikator: ${cleanName}`;
    }

    function updateUI() {
        const filtered = rawData.filter(d => selectedPeriode === 'Semua' || d.Periode === selectedPeriode)
                         .sort((a, b) => (a["Nama Karyawan"] || "").localeCompare(b["Nama Karyawan"] || ""));
        
        const topThreeForChart = [...filtered].sort((a, b) => (Number(b[selectedCategory]) || 0) - (Number(a[selectedCategory]) || 0)).slice(0, 3);
        const topTwoFinal = [...filtered].sort((a, b) => (Number(b["Nilai Akhir"]) || 0) - (Number(a["Nilai Akhir"]) || 0)).slice(0, 2);
        
        renderChart(filtered, topThreeForChart);
        renderTopCards(topTwoFinal);
    }

    function renderChart(data, topThree) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        const emptyState = document.getElementById('emptyState');
        if (data.length === 0) {
            emptyState.classList.remove('hidden');
            if (chartInstance) chartInstance.destroy();
            return;
        }
        emptyState.classList.add('hidden');
        const labels = data.map(d => d["Nama Karyawan"]);
        const values = data.map(d => Number(d[selectedCategory]) || 0);
        const topNames = topThree.map(t => t["Nama Karyawan"]);
        const backgroundColors = labels.map(name => {
            if (name === topNames[0]) return '#005FB0';
            if (name === topNames[1]) return '#4A71B5';
            if (name === topNames[2]) return '#8BA6D5';
            return '#E0E2EC';
        });
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets: [{ data: values, backgroundColor: backgroundColors, borderRadius: 8, borderSkipped: false, barThickness: labels.length > 10 ? 15 : 30 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: 'white', titleColor: '#191C20', bodyColor: '#44474E', padding: 12, cornerRadius: 12, displayColors: false, borderColor: '#E0E2EC', borderWidth: 1, callbacks: { label: (context) => `Skor: ${context.raw}` } } }, scales: { y: { beginAtZero: true, max: 100, grid: { color: '#F3F3F3', drawBorder: false }, ticks: { color: '#74777F', font: { size: 9, weight: 'bold' } } }, x: { grid: { display: false }, ticks: { color: '#44474E', font: { size: 9, weight: 'bold' }, maxRotation: 45, minRotation: 45 } } }, animation: { duration: 1000, easing: 'easeOutQuart' } }
        });
    }

    /* DOWNLOAD AS IMAGE SECURITY FUNCTIONS */
    function requestDownload(id, name) {
        pendingDownload = { id, name };
        document.getElementById('certPasswordInput').value = '';
        document.getElementById('passwordError').classList.add('hidden');
        
        const modal = document.getElementById('passwordModal');
        const content = document.getElementById('passwordModalContent');
        modal.classList.remove('hidden');
        setTimeout(() => {
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function closePasswordModal() {
        const modal = document.getElementById('passwordModal');
        const content = document.getElementById('passwordModalContent');
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => modal.classList.add('hidden'), 250);
    }

    function verifyAndDownload() {
        const input = document.getElementById('certPasswordInput').value;
        if (input === '1111') {
            const element = document.getElementById(pendingDownload.id);
            
            // Gunakan html2canvas untuk konversi ke Gambar
            html2canvas(element, {
                scale: 2, // Kualitas Tinggi
                useCORS: true,
                backgroundColor: '#ffffff'
            }).then(canvas => {
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `Piagam_${pendingDownload.name.replace(/\s+/g, '_')}.png`;
                link.href = image;
                link.click();
                closePasswordModal();
            });
        } else {
            document.getElementById('passwordError').classList.remove('hidden');
        }
    }

    function renderTopCards(topTwo) {
        const section = document.getElementById('topRankingSection');
        const container = document.getElementById('topCardsContainer');
        const hasValidData = topTwo && topTwo.length > 0 && (Number(topTwo[0]["Nilai Akhir"]) || 0) > 0;
        
        if (!hasValidData) {
            if (section) section.classList.add('hidden');
            return;
        }

        section.classList.remove('hidden');
        container.innerHTML = topTwo.map((emp, idx) => {
            const nilaiAkhir = Number(emp["Nilai Akhir"]) || 0;
            const displayName = nilaiAkhir > 0 ? emp["Nama Karyawan"] : "-";
            const certId = `cert-${idx}`;
            const awardLevel = idx === 0 ? "Utama (Gold)" : "Kedua (Silver)";
            const certClass = idx === 0 ? "cert-gold" : "cert-silver";
            const btnColor = idx === 0 ? "bg-[#B38728]" : "bg-[#606060]";

            return `
                <div class="space-y-4">
                    <div id="${certId}" class="certificate-container ${certClass} w-full max-w-4xl mx-auto">
                        <div class="certificate-content">
                            <div class="mb-6">
                                <p class="text-[10px] md:text-xs font-bold uppercase tracking-[0.3em] text-[#005FB0]">PT. OCS Global Services Indonesia</p>
                                <p class="text-[9px] md:text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400">Area PT. Nissin Foods Indonesia</p>
                            </div>
                            <h1 class="certificate-title text-3xl md:text-4xl font-bold uppercase mb-2">Piagam Penghargaan</h1>
                            <p class="text-sm md:text-base italic text-slate-500 mb-8 uppercase tracking-widest">Diberikan sebagai apresiasi kepada</p>
                            <h2 class="certificate-recipient text-4xl md:text-5xl font-bold mb-6">${displayName}</h2>
                            <div class="max-w-2xl mx-auto mb-10">
                                <p class="text-base md:text-lg leading-relaxed text-slate-700">
                                    Atas pencapaian kinerja terbaik sebagai Karyawan <strong>Peringkat ${awardLevel}</strong>
                                    pada periode <strong>${emp["Periode"]}</strong> dengan perolehan Nilai Akhir sebesar
                                    <span class="text-2xl font-bold text-[#005FB0] ml-1">${nilaiAkhir}</span>.
                                </p>
                            </div>
                            <div class="flex justify-between items-end mt-12 px-10">
                                <div class="text-center w-40 border-t border-slate-400 pt-2">
                                    <p class="text-[10px] font-bold uppercase">Area Manager</p>
                                </div>
                                <div class="text-center mb-[-20px]">
                                     <p class="text-[10px] text-slate-400 font-mono">Verified OCS NFI Quality Audit</p>
                                </div>
                                <div class="text-center w-40 border-t border-slate-400 pt-2">
                                    <p class="text-[10px] font-bold uppercase">Team Leader</p>
                                </div>
                            </div>
                            <div class="seal">
                                <div class="text-center scale-75">
                                    <i data-lucide="award" class="w-10 h-10 mx-auto"></i>
                                    <p class="text-[8px] font-bold uppercase mt-1">Excellent</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-center">
                        <button onclick="requestDownload('${certId}', '${displayName}')" class="flex items-center gap-2 ${btnColor} text-white px-6 py-3 rounded-full hover:opacity-90 transition-all font-bold text-xs shadow-lg active:scale-95">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            Unduh Piagam ${idx === 0 ? 'Emas' : 'Perak'} (Gambar)
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        lucide.createIcons();
    }
</script>
